name: Release PuzzleSolver

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+'

jobs:
  build-test-publish:
    name: Build & Test & Publish
    runs-on: ubuntu-latest
    
    env:
      VERSION: 1.0
      CONFIGURATION: Release
      TARGET_RIDS: "osx-arm64 linux-x64 win-x64"
    
    steps:
      - name: Extract version
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          echo "VERSION=$VERSION" >> $GITHUB_ENV
        
      - name: Cloning repository
        uses: actions/checkout@v6
        
      - name: Installing dotnet
        uses: actions/setup-dotnet@v5
        with:
          global-json-file: global.json
       
      - name: Building solution
        run: dotnet build -c $CONFIGURATION
      
      - name: Installing playwright
        shell: pwsh
        run: artifacts/bin/PuzzleSolver.Cli/release/playwright.ps1 install --with-deps chromium
        
      - name: Testing solution
        run: dotnet test -c $CONFIGURATION --no-build
        
      - name: Publishing cli
        shell: bash
        run: |
          for RID in $TARGET_RIDS; do
            dotnet publish src/PuzzleSolver.Cli/PuzzleSolver.Cli.csproj \
              -p:Version=$VERSION \
              -c $CONFIGURATION \
              -r $RID \
              -o artifacts/publish/$RID \
              -p:PublishSingleFile=true \
              --self-contained 
          done
          
      - name: Uploading artifacts
        uses: actions/upload-artifact@v6
        with:
          path: artifacts/publish